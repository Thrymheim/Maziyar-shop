{% extends "base.html" %}
{% block title %}تماس با ما - مازیار شاپ{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="text-center mb-5">
                <h2 class="fw-bold"><i class="bi bi-envelope me-2"></i>تماس با ما</h2>
                <p class="text-muted">ما آماده شنیدن نظرات و پیشنهادات شما هستیم</p>
            </div>

            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="card text-center h-100 shadow-sm">
                        <div class="card-body">
                            <div class="bg-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                                <i class="bi bi-telephone text-white fs-4"></i>
                            </div>
                            <h6 class="fw-bold">تلفن</h6>
                            <p class="text-muted mb-0">۰۲۱-۱۲۳۴۵۶۷۸</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card text-center h-100 shadow-sm">
                        <div class="card-body">
                            <div class="bg-success rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                                <i class="bi bi-envelope text-white fs-4"></i>
                            </div>
                            <h6 class="fw-bold">ایمیل</h6>
                            <p class="text-muted mb-0">digikala@gmail.com</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-4">
                    <div class="card text-center h-100 shadow-sm">
                        <div class="card-body">
                            <div class="bg-warning rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                                <i class="bi bi-geo-alt text-white fs-4"></i>
                            </div>
                            <h6 class="fw-bold">آدرس</h6>
                            <p class="text-muted mb-0">مازندران، ایران</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm mt-4">
                <div class="card-body">
                    <h5 class="mb-4">ارسال پیام</h5>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">نام</label>
                                <input type="text" class="form-control" name="name" required placeholder="نام خود را وارد کنید">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">ایمیل</label>
                                <input type="email" class="form-control" name="email" required placeholder="ایمیل خود را وارد کنید">
                            </div>
                            <div class="col-12">
                                <label class="form-label">موضوع</label>
                                <input type="text" class="form-control" name="subject" placeholder="موضوع پیام">
                            </div>
                            <div class="col-12">
                                <label class="form-label">پیام</label>
                                <textarea class="form-control" name="message" rows="5" required placeholder="پیام خود را بنویسید..."></textarea>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-send me-1"></i>ارسال پیام
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
